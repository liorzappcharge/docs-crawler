name: Documentation Validation

on:
  # Run every day at 06:00 UTC
  schedule:
    - cron: '0 6 * * *'
  # Allow manual runs from the Actions tab (optionally override the target URL)
  workflow_dispatch:
    inputs:
      docs_url:
        description: 'Docs URL to crawl (leave blank to use linkinator.config.json)'
        required: false
        default: 'https://docs.appcharge.com'

jobs:
  validate-docs:
    name: Validate Documentation Links
    runs-on: ubuntu-latest
    # Hard cap for the entire job; the crawl step has its own inner timeout.
    timeout-minutes: 60
    # contents: write is required to push screenshots to the ci-reports branch.
    permissions:
      contents: write

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Runtime ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache npm dependencies based on package-lock.json to speed up installs.
          cache: 'npm'

      # ── 3. Dependencies ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 4. Playwright browser ──────────────────────────────────────────────────
      # Downloads the Chromium binary used by screenshot.mjs.
      # --with-deps also installs the OS-level libraries Chromium needs on Linux.
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # ── 5. Output directory ────────────────────────────────────────────────────
      # Must exist before the crawl so stderr redirection (2>reports/crawl.log)
      # doesn't fail at the shell level before Node.js even starts.
      - name: Create reports directory
        run: mkdir -p reports

      # ── 6. Crawl ───────────────────────────────────────────────────────────────
      # check.mjs exits 1 when broken links are found. continue-on-error lets the
      # reporting steps run regardless; the job is re-failed explicitly at step 11.
      - name: Crawl documentation and check links
        id: crawl
        timeout-minutes: 30
        continue-on-error: true
        env:
          # Honour a URL override supplied via workflow_dispatch, otherwise the
          # default in linkinator.config.json is used.
          DOCS_URL: ${{ github.event.inputs.docs_url }}
        run: |
          # Redirect progress/warning logs (stderr) to a file so they can be
          # uploaded as an artifact; the JSON summary written by check.mjs lands
          # in reports/crawl-report.json directly.
          npm run check 2>reports/crawl.log

      # ── 7. Screenshot broken-link pages ───────────────────────────────────────
      # Opens each source page that contains broken links in a headless browser,
      # highlights the offending anchors in red, and saves a viewport screenshot.
      # Runs even when the crawl failed so reviewers always get visual context.
      - name: Screenshot pages with broken links
        if: always()
        timeout-minutes: 10
        env:
          DOCS_URL: ${{ github.event.inputs.docs_url }}
        run: npm run screenshot

      # ── 8. Publish screenshots to GitHub ──────────────────────────────────────
      # Pushes each highlighted PNG to an orphan ci-reports branch via the GitHub
      # Data API so they get a raw.githubusercontent.com URL. Those URLs render
      # inline in the job summary — the reviewer sees screenshots directly in the
      # GitHub Actions UI without downloading any artifact.
      - name: Publish screenshots to GitHub
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node << 'UPLOAD'
          const https = require('https');
          const fs   = require('fs');

          const token  = process.env.GITHUB_TOKEN;
          const repo   = process.env.GITHUB_REPOSITORY;
          const runId  = process.env.GITHUB_RUN_ID;
          const branch = 'ci-reports';
          // Well-known SHA of the empty git tree — used to seed the orphan branch.
          const EMPTY_TREE = '4b825dc642cb6eb9a060e54bf8d69288fbee4904';

          // ── Minimal GitHub API helper ──────────────────────────────────────
          async function api(method, path, body) {
            return new Promise((resolve, reject) => {
              const payload = body ? JSON.stringify(body) : null;
              const req = https.request({
                hostname: 'api.github.com', path, method,
                headers: {
                  Authorization: `Bearer ${token}`,
                  'Content-Type': 'application/json',
                  'User-Agent': 'docs-crawler-ci',
                  'X-GitHub-Api-Version': '2022-11-28',
                  ...(payload ? { 'Content-Length': Buffer.byteLength(payload) } : {}),
                },
              }, res => {
                let b = '';
                res.on('data', c => b += c);
                res.on('end', () => {
                  try { resolve({ status: res.statusCode, body: JSON.parse(b) }); }
                  catch { resolve({ status: res.statusCode, body: b }); }
                });
              });
              req.on('error', reject);
              if (payload) req.write(payload);
              req.end();
            });
          }

          // Collect PNGs written by screenshot.mjs
          const pngs = fs.existsSync('reports/screenshots')
            ? fs.readdirSync('reports/screenshots').filter(f => f.endsWith('.png'))
            : [];

          if (pngs.length === 0) {
            fs.writeFileSync('reports/screenshot-urls.json', '{}');
            console.log('No screenshots to publish.');
            process.exit(0);
          }

          // ── Ensure ci-reports orphan branch exists ─────────────────────────
          const branchCheck = await api('GET', `/repos/${repo}/git/ref/heads/${branch}`);
          let currentCommitSha;
          if (branchCheck.status === 404) {
            // Create an empty commit to seed the orphan branch (no repo code included).
            const init = await api('POST', `/repos/${repo}/git/commits`, {
              message: 'Initialize ci-reports branch',
              tree: EMPTY_TREE, parents: [],
            });
            await api('POST', `/repos/${repo}/git/refs`, {
              ref: `refs/heads/${branch}`, sha: init.body.sha,
            });
            currentCommitSha = init.body.sha;
            console.log(`Created orphan branch "${branch}"`);
          } else {
            currentCommitSha = branchCheck.body.object.sha;
          }

          // ── Create git blobs for every PNG ─────────────────────────────────
          // Using the Data API avoids the 1 MB limit of the Contents API.
          const treeEntries = [];
          const urlMap = {};
          for (const filename of pngs) {
            const content = fs.readFileSync(`reports/screenshots/${filename}`).toString('base64');
            const blob = await api('POST', `/repos/${repo}/git/blobs`, { content, encoding: 'base64' });
            if (blob.status !== 201) {
              console.error(`✗ blob failed for ${filename}: ${JSON.stringify(blob.body).slice(0, 200)}`);
              continue;
            }
            treeEntries.push({ path: `${runId}/${filename}`, mode: '100644', type: 'blob', sha: blob.body.sha });
            urlMap[filename] = `https://raw.githubusercontent.com/${repo}/${branch}/${runId}/${filename}`;
            console.log(`✓ ${filename}`);
          }

          if (treeEntries.length === 0) {
            fs.writeFileSync('reports/screenshot-urls.json', '{}');
            process.exit(0);
          }

          // ── Commit all blobs in a single round-trip ─────────────────────────
          const baseTree = (await api('GET', `/repos/${repo}/git/commits/${currentCommitSha}`)).body.tree.sha;
          const tree    = await api('POST', `/repos/${repo}/git/trees`, { base_tree: baseTree, tree: treeEntries });
          const commit  = await api('POST', `/repos/${repo}/git/commits`, {
            message: `CI screenshots — run ${runId}`, tree: tree.body.sha, parents: [currentCommitSha],
          });
          await api('PATCH', `/repos/${repo}/git/refs/heads/${branch}`, { sha: commit.body.sha });

          fs.writeFileSync('reports/screenshot-urls.json', JSON.stringify(urlMap, null, 2));
          console.log(`\n✅ Published ${Object.keys(urlMap).length} screenshot(s) → ${branch}/${runId}/`);
          UPLOAD

      # ── 9. Generate Markdown report ────────────────────────────────────────────
      # Reads reports/crawl-report.json and reports/screenshots/index.json, then
      # produces report.md which is used both as an artifact and as the job summary.
      # Inline image tags in report.md resolve to the screenshots/ folder, so the
      # images render correctly when the artifact is downloaded and opened locally.
      - name: Generate Markdown report
        if: always()
        run: |
          node << 'GENREPORT'
          const fs = require('fs');

          // ── Load crawl report (fall back to empty skeleton on crash) ───────────
          let report;
          try {
            report = JSON.parse(fs.readFileSync('reports/crawl-report.json', 'utf8'));
          } catch {
            report = {
              timestamp: new Date().toISOString(),
              url: process.env.DOCS_URL || '(unknown)',
              passed: false,
              stats: {
                totalPagesCrawled: 0, totalLinksChecked: 0, totalOk: 0, totalSkipped: 0,
                broken404: 0, brokenAnchors: 0, serverErrors: 0,
                botBlocked: 0, redirectErrors: 0, networkErrors: 0,
              },
              broken404: [], brokenAnchors: [], serverErrors: [],
              botBlocked: [], redirectErrors: [], networkErrors: [],
            };
          }

          // ── Load screenshot index (optional — screenshots may not exist) ───────
          let screenshots = [];
          try {
            screenshots = JSON.parse(fs.readFileSync('reports/screenshots/index.json', 'utf8'));
          } catch { /* no screenshots */ }

          // CDN URLs written by the "Publish screenshots to GitHub" step.
          // raw.githubusercontent.com URLs render directly in the GitHub Actions
          // job summary; relative paths are the fallback for the local artifact.
          let screenshotUrls = {};
          try {
            screenshotUrls = JSON.parse(fs.readFileSync('reports/screenshot-urls.json', 'utf8'));
          } catch { /* no CDN URLs */ }

          // Build a map: source page URL → image URL
          const screenshotByPage = {};
          for (const s of screenshots) {
            if (!s.screenshot) continue;
            screenshotByPage[s.page] = screenshotUrls[s.screenshot] || `screenshots/${s.screenshot}`;
          }

          const { stats } = report;
          const icon = report.passed ? '✅' : '❌';
          const lines = [];

          // ── Header ──────────────────────────────────────────────────────────
          lines.push(`# ${icon} Documentation Validation Report`);
          lines.push('');
          lines.push(`**Date:** ${report.timestamp}`);
          lines.push(`**URL:** ${report.url}`);
          lines.push('');

          // ── Summary table ───────────────────────────────────────────────────
          lines.push('## Summary');
          lines.push('');
          lines.push('| Metric | Count |');
          lines.push('|---|---|');
          lines.push(`| 🌐 Pages crawled       | ${stats.totalPagesCrawled} |`);
          lines.push(`| 🔍 Links checked       | ${stats.totalLinksChecked} |`);
          lines.push(`| ✅ OK                  | ${stats.totalOk} |`);
          lines.push(`| ❌ Broken (404)        | ${stats.broken404} |`);
          lines.push(`| 🔗 Invalid anchors     | ${stats.brokenAnchors} |`);
          lines.push(`| ↩️ Redirect errors      | ${stats.redirectErrors} |`);
          lines.push(`| ⏱️ Network failures     | ${stats.networkErrors} |`);
          lines.push(`| ⚠️ Server errors (5xx)  | ${stats.serverErrors} |`);
          lines.push(`| 🤖 Bot-blocked (403)   | ${stats.botBlocked} |`);
          lines.push('');

          // ── Failures — grouped by source page ──────────────────────────────
          // Each page gets one block: broken-link table + its screenshot inline.
          // This lets a reviewer see the visual context without switching sections.
          const allFailed = [
            ...report.broken404.map(l => ({ ...l, type: '404 Not Found' })),
            ...report.brokenAnchors.map(l => ({ ...l, type: 'Invalid Anchor' })),
            ...report.networkErrors.map(l => ({ ...l, type: 'Network Error' })),
          ];

          if (!report.passed && allFailed.length > 0) {
            // Group entries by source page, sorted by most broken links first.
            const byPage = new Map();
            for (const entry of allFailed) {
              const key = entry.parent || '(unknown source)';
              if (!byPage.has(key)) byPage.set(key, []);
              byPage.get(key).push(entry);
            }
            const sortedPages = [...byPage.entries()].sort((a, b) => b[1].length - a[1].length);

            lines.push('## ❌ Failures');
            lines.push('');
            lines.push(`> **${sortedPages.length} source page(s)** contain broken links.`);
            lines.push('> Download the artifact and open `report.md` locally to view screenshots.');
            lines.push('');

            sortedPages.forEach(([pageUrl, entries], i) => {
              lines.push(`### ${i + 1}. ${pageUrl}`);
              lines.push('');

              // Broken links table for this page
              lines.push('| Type | Broken URL |');
              lines.push('|------|------------|');
              for (const e of entries.slice(0, 30)) {
                lines.push(`| ${e.type} | ${e.url} |`);
              }
              if (entries.length > 30) {
                lines.push(`| _…and ${entries.length - 30} more — see \`crawl-report.json\`_ | |`);
              }
              lines.push('');

              // CDN URL → renders in GitHub Actions UI; relative path → renders locally
              const shot = screenshotByPage[pageUrl];
              if (shot) {
                lines.push(`![Broken links highlighted on ${pageUrl}](${shot})`);
                lines.push('');
              }

              if (i < sortedPages.length - 1) lines.push('---');
              lines.push('');
            });
          }

          // ── Warnings (server errors — don't fail the job) ───────────────────
          if (report.serverErrors.length > 0) {
            lines.push('## ⚠️ Warnings');
            lines.push('');
            lines.push('> Server errors may be transient; they do **not** fail the workflow.');
            lines.push('');
            lines.push('| Status | URL | Source Page |');
            lines.push('|--------|-----|-------------|');
            for (const e of report.serverErrors.slice(0, 30)) {
              lines.push(`| ${e.status ?? '-'} | ${e.url} | ${e.parent ?? '-'} |`);
            }
            lines.push('');
          }

          // ── Top failed URLs ─────────────────────────────────────────────────
          if (allFailed.length > 0) {
            const counts = {};
            for (const l of allFailed) counts[l.url] = (counts[l.url] || 0) + 1;
            const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
            lines.push('## 🔝 Top Failed URLs');
            lines.push('');
            lines.push('| # | URL | Occurrences |');
            lines.push('|---|-----|-------------|');
            top.forEach(([u, n], i) => lines.push(`| ${i + 1} | ${u} | ${n} |`));
            lines.push('');
          }

          fs.writeFileSync('reports/report.md', lines.join('\n'));
          console.log('Markdown report written to reports/report.md');
          GENREPORT

      # ── 9. Publish job summary ─────────────────────────────────────────────────
      # The Markdown report is appended to the built-in GitHub Actions job summary
      # so results are visible directly on the workflow run page.
      - name: Publish job summary
        if: always()
        run: cat reports/report.md >> "$GITHUB_STEP_SUMMARY"

      # ── 10. Upload artifacts ───────────────────────────────────────────────────
      # All report files — including screenshots — are preserved for 30 days even
      # when the job fails. Download the artifact and open report.md to see the
      # screenshots rendered inline alongside the broken-link tables.
      - name: Upload reports as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-validation-${{ github.run_id }}
          path: |
            reports/crawl-report.json
            reports/report.md
            reports/crawl.log
            reports/screenshots/*.png
          retention-days: 30

      # ── 11. Failure gate ───────────────────────────────────────────────────────
      # Re-surface the crawl failure after all reporting steps have completed.
      # This is what actually marks the workflow run as failed in GitHub.
      - name: Fail if broken links were detected
        if: steps.crawl.outcome == 'failure'
        run: |
          echo "::error::Broken links detected. Review the job summary and download the artifacts for details."
          exit 1
